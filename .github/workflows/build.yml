name: Build AntiDropshot Plugin

on: [push]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore AntiDropshot.csproj

    - name: Build
      run: msbuild AntiDropshot.csproj /p:Configuration=Release

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: AntiDropshot-Package
        # Путь теперь соответствует настройкам в .csproj
        path: bin/Release/AntiDropshot.dll
